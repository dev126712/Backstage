apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: product-service
  description: Handles product catalog
  annotations:
    backstage.io/techdocs-ref: dir:.
spec:
  type: openapi
  lifecycle: development
  owner: group:devops
  definition: |
    openapi: "3.0.0"
    info:
      title: Product Service API
      version: "1.0"
    servers:
      - url: http://localhost:8080/api/products
    paths:
      /:
        get:
          summary: Get all products
          responses:
            '200':
              description: List of all products from Redis
        post:
          summary: Create a product
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    name:
                      type: string
                    price:
                      type: number
          responses:
            '201':
              description: Product created
      /{id}:
        get:
          summary: Get product by ID (cache-aside)
          parameters:
            - in: path
              name: id
              required: true
              schema:
                type: string
          responses:
            '200':
              description: Product found (from cache or main store)
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      source:
                        type: string
                        enum: [cache, main_store]
                      data:
                        type: object
            '404':
              description: Product not found
        put:
          summary: Update a product
          parameters:
            - in: path
              name: id
              required: true
              schema:
                type: string
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    name:
                      type: string
                    price:
                      type: number
          responses:
            '200':
              description: Product updated, cache invalidated
        delete:
          summary: Delete a product
          parameters:
            - in: path
              name: id
              required: true
              schema:
                type: string
          responses:
            '200':
              description: Product deleted
            '404':
              description: Product not found
